<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testes 1.0</title>

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <div id="content-wrapper">
        <section class="filters">
            <div id="info-container" class="filter-controls">
                <h2 class="logo">BlackVis</h2>
                
                <div class="filters-group">
                    <div class="control-item">
                        <label>Por Ano de Nascimento:</label>
                        <div id="year-slider">
                            <span id="value-min"></span>
                            <svg id="dual-slider"></svg>
                            <span id="value-max"></span>
                        </div>
                    </div>
                
                    <div class="control-item">
                        <label>ÁREA DO DESIGN:</label>
                        <select id="category-filter" onchange="window.applyAllFilters()">
                            <option value="all">Todas</option>
                        </select>
                    </div>
                
                    <div class="control-item">
                        <label>POR NOME:</label>
                        <input type="text" id="search-input" placeholder="Digite o nome..."
                               onkeypress="if(event.key === 'Enter') applyAllFilters()">
                    </div>
                </div>
            </div>
        </section>
        <section class="cards">
            <div class="grafico-container">
                <svg id="grafico-d3"></svg>
            </div>
            
            <div id="card" class="card">
                <div class="corner top left"></div>
                <div class="corner top right"></div>
                <div class="corner bottom left"></div>
                <div class="corner bottom right"></div>

                <hr class="card-divider">
                <h2 id="perfil-nome">Selecione um Designer</h2>
                <p> 
                    <span id="card-info">Nenhuma</span>
                </p>
                <p id="perfil-descricao"></p>
                <a id="btn-link-externo" class="btn"></a>
            </div>
        </section>
    </div>



    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/globals.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/colors.js"></script>
    <script src="js/preprocess.js"></script>
    <script src="js/interactions.js"></script>
    <script src="js/draw.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/loader.js"></script>

</body>
</html>
