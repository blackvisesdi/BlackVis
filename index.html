<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste BlackVIS</title>

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <div id="content-wrapper">

        <nav class="top-nav">
            <span class="nav-link">Home</span>
            <div class="nav-center">
                <img src="assets/Adinkra-01.png" alt="BlackVIS" width="36" height="36" style="display:block">
            </div>
            <span class="nav-link">Sobre</span>
        </nav>

        <section class="cards">
            <div class="grafico-container">
                <svg id="grafico-d3"></svg>
            </div>

            <div id="card" class="card">
                <div class="corner top left"></div>
                <div class="corner top right"></div>
                <div class="corner bottom left"></div>
                <div class="corner bottom right"></div>

                <h2 id="perfil-nome">Selecione um Designer</h2>
                <p>
                    <span id="card-info">Nenhuma</span>
                </p>
                <p id="perfil-descricao"></p>
                <a id="btn-link-externo" class="btn"></a>
            </div>
        </section>

        <div class="bottom-bar">

            <div class="bb-left">
                <p class="bb-description">BlackVIS é uma visualização de designers negros brasileiros e estrangeiros, conectando pessoas, técnicas e áreas do design gráfico.</p>
                <div class="nationality-filters">
                    <button class="nat-btn" data-value="Brasileira">
                        <span class="nat-icon">?</span>
                        <span>Brasileiro</span>
                    </button>
                    <button class="nat-btn" data-value="Estrangeira">
                        <span class="nat-icon">?</span>
                        <span>Estrangeiro</span>
                    </button>
                </div>
            </div>

            <div class="bb-center">
                <button class="category-btn" data-value="Comunicação" style="--cat-color: #0511F2">
                    <img src="assets/icons/comunica/Adinkra_Comunicação.png" alt="comunicação">
                    <span>comunicação</span>
                </button>
                <button class="category-btn" data-value="Produto" style="--cat-color: #FFD417">
                    <img src="assets/icons/produ/Adinkra-05.png" alt="produto">
                    <span>produto</span>
                </button>
                <button class="category-btn" data-value="Teórico" style="--cat-color: #22CC1D">
                    <img src="assets/icons/teori/Adinkra_Teórico.png" alt="teórico">
                    <span>teórico</span>
                </button>
                <button class="category-btn" data-value="Interação" style="--cat-color: #D930AC">
                    <img src="assets/icons/intera/Adinkra_Interação.png" alt="interação">
                    <span>interação</span>
                </button>
                <button class="category-btn" data-value="Serviço" style="--cat-color: #F14505">
                    <img src="assets/icons/servi/Adinkra_Serviço.png" alt="serviço">
                    <span>serviço</span>
                </button>
            </div>

            <div class="bb-right">
                <input type="text" id="search-input" placeholder="Buscar designer..."
                       onkeypress="if(event.key === 'Enter') applyAllFilters()">
                <div id="year-slider">
                    <span id="value-min"></span>
                    <svg id="dual-slider"></svg>
                    <span id="value-max"></span>
                </div>
            </div>

        </div>

    </div>

    <script src="https://d3js.org/d3.v7.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
    <script src="js/globals.js?v=5"></script>
    <script src="js/interactions.js?v=5"></script>
    <script src="js/draw.js?v=5"></script>
    <script src="js/data.js?v=5"></script>

</body>
</html>
